<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stube - StudyTube</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #222;
  color: white;
  padding: 10px;
  text-align: center;
}

.container {
  padding: 20px;
}

input, button {
  padding: 8px;
  margin: 5px;
}

.video-player {
  margin-top: 20px;
}

iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
}

.playlist-section {
  margin-top: 30px;
  padding: 15px;
  background: white;
  border-radius: 10px;
}

.playlist {
  border: 1px solid #ccc;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
}

.video-item {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>
  <h1>📚 Stube - StudyTube</h1>
</header>

<div class="container">

  <!-- VIDEO PLAYER -->
  <h2>Watch Video</h2>
  <input type="text" id="videoURL" placeholder="Paste YouTube URL">
  <button onclick="loadVideo()">Play</button>

  <div class="video-player">
    <iframe id="player" src="" allowfullscreen></iframe>
  </div>

  <!-- PLAYLIST SECTION -->
  <div class="playlist-section">
    <h2>🎵 Playlists</h2>

    <input type="text" id="playlistName" placeholder="New playlist name">
    <button onclick="createPlaylist()">Create</button>

    <div id="playlists"></div>
  </div>

</div>

<script>
let playlists = JSON.parse(localStorage.getItem("playlists")) || {};
let currentVideo = "";

// Convert normal YouTube link → embed link
function convertToEmbed(url) {
  if (url.includes("watch?v=")) {
    return url.replace("watch?v=", "embed/");
  }
  if (url.includes("youtu.be/")) {
    return url.replace("youtu.be/", "youtube.com/embed/");
  }
  return url;
}

// Load video
function loadVideo() {
  let url = document.getElementById("videoURL").value.trim();
  if (!url) return;

  currentVideo = url;
  document.getElementById("player").src = convertToEmbed(url);
}

// Save
function savePlaylists() {
  localStorage.setItem("playlists", JSON.stringify(playlists));
}

// Create playlist
function createPlaylist() {
  let name = document.getElementById("playlistName").value.trim();
  if (!name) return alert("Enter name");

  if (playlists[name]) {
    alert("Already exists");
    return;
  }

  playlists[name] = [];
  savePlaylists();
  displayPlaylists();
  document.getElementById("playlistName").value = "";
}

// Delete playlist
function deletePlaylist(name) {
  delete playlists[name];
  savePlaylists();
  displayPlaylists();
}

// Add current video
function addCurrentVideo(name) {
  if (!currentVideo) {
    alert("Play a video first");
    return;
  }

  playlists[name].push(currentVideo);
  savePlaylists();
  displayPlaylists();
}

// Remove video
function removeVideo(name, index) {
  playlists[name].splice(index, 1);
  savePlaylists();
  displayPlaylists();
}

// Play from playlist
function playFromPlaylist(url) {
  currentVideo = url;
  document.getElementById("player").src = convertToEmbed(url);
}

// Display playlists
function displayPlaylists() {
  let container = document.getElementById("playlists");
  container.innerHTML = "";

  for (let name in playlists) {
    let div = document.createElement("div");
    div.className = "playlist";

    let videosHTML = playlists[name].map((video, index) => {
      return `
        <div class="video-item">
          <span onclick="playFromPlaylist('${video}')" style="cursor:pointer;color:blue">
            ▶ Play
          </span>
          <button onclick="removeVideo('${name}', ${index})">❌</button>
        </div>
      `;
    }).join("");

    div.innerHTML = `
      <h3>${name}</h3>
      <button onclick="addCurrentVideo('${name}')">➕ Add Current Video</button>
      <button onclick="deletePlaylist('${name}')">🗑 Delete</button>
      ${videosHTML}
    `;

    container.appendChild(div);
  }
}

displayPlaylists();
</script>

</body>
</html>
